<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ms. Ja</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11/lib/addon-unicode11.min.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">Ms. Ja</div>
    <a href="#" class="nav-item active" data-page="/" id="nav-dashboard">Dashboard</a>
    <a href="#" class="nav-item" data-page="/lore" id="nav-lore">Lore</a>
    <a href="#" class="nav-item" data-page="/images" id="nav-images">Images</a>
    <a href="#" class="nav-item" data-page="/memories" id="nav-memories">Memories</a>
    <a href="#" class="nav-item" data-page="/emails" id="nav-emails">Emails</a>
    <a href="#" class="nav-item" data-page="/documents" id="nav-documents">Documents</a>
    <a href="#" class="nav-item" data-page="/todos" id="nav-todos">Todos</a>
    <a href="#" class="nav-item" data-page="/calendar" id="nav-calendar">Calendar</a>
    <a href="#" class="nav-item" data-page="/reflections" id="nav-reflections">Reflections</a>
    <a href="#" class="nav-item" data-page="/files" id="nav-files">Files</a>
    <a href="#" class="nav-item" data-page="/settings" id="nav-settings">Settings</a>
    <div class="sidebar-spacer"></div>
    <button class="nav-item terminal-toggle" onclick="toggleTerminal()">
      <span id="term-icon">▶</span> Terminal
    </button>
  </nav>

  <div class="main-wrapper">
    <iframe id="content-frame" src="/page/" class="content-frame"></iframe>

    <aside class="terminal-panel hidden" id="terminal-panel">
      <div class="terminal-header">
        <span>Terminal</span>
        <div class="terminal-actions">
          <button class="btn-sm" onclick="toggleTerminal()">✕</button>
        </div>
      </div>
      <div id="terminal-container"></div>
    </aside>
  </div>

  <script>
  // Navigation — change iframe src, not full page
  document.querySelectorAll('.nav-item[data-page]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const page = link.dataset.page;
      document.getElementById('content-frame').src = '/page' + page;
      // Update active state
      document.querySelectorAll('.nav-item[data-page]').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });

  // Listen for navigation from inside iframe (for links like document detail)
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'navigate') {
      document.getElementById('content-frame').src = '/page' + e.data.path;
    }
  });

  // Broadcast terminal state whenever iframe loads a new page
  document.getElementById('content-frame').addEventListener('load', () => {
    if (typeof broadcastTerminalState === 'function') {
      setTimeout(broadcastTerminalState, 100);
    }
  });
  </script>
  <script src="/static/js/terminal.js"></script>
</body>
</html>
